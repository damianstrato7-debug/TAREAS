<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CAD Workstation - Control Damián Alvarez</title>
  <style>
    :root {
      --cad-bg: #1e1e1e;
      --cad-panel: #252526;
      --cad-header: #181818;
      --cad-border: #3c3c3c;
      --cad-cyan: #00f2fe;
      --cad-yellow: #eab308;
      --cad-red: #ef4444;
      --cad-green: #22c55e;
      --cad-text: #d4d4d4;
      --cad-text-dim: #858585;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Consolas', 'Courier New', monospace, sans-serif; }
    body { background-color: var(--cad-bg); color: var(--cad-text); padding: 20px; }

    /* Header Estilo CAD */
    .header {
      background-color: var(--cad-header);
      color: var(--cad-text);
      padding: 14px 20px;
      border-radius: 4px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
      border: 1px solid var(--cad-border);
      border-left: 5px solid var(--cad-cyan);
      flex-wrap: wrap;
      gap: 10px;
    }
    .header-title h1 { font-size: 1.2rem; font-weight: 700; color: #fff; letter-spacing: 0.5px; }
    .header-title p { font-size: 0.75rem; color: var(--cad-text-dim); margin-top: 2px; }
    
    .user-badge {
      background-color: var(--cad-panel);
      border: 1px solid var(--cad-border);
      padding: 4px 12px;
      border-radius: 3px;
      font-size: 0.8rem;
      color: var(--cad-text-dim);
    }
    .user-badge strong { color: var(--cad-cyan); }

    /* Controls Bar */
    .controls-bar {
      background-color: var(--cad-panel);
      border: 1px solid var(--cad-border);
      border-radius: 4px;
      padding: 10px 16px;
      margin-bottom: 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 12px;
    }
    
    .filter-submenu {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .filter-submenu label { font-size: 0.8rem; color: var(--cad-text-dim); text-transform: uppercase; }
    .cad-select {
      background-color: var(--cad-bg);
      color: var(--cad-cyan);
      border: 1px solid var(--cad-border);
      padding: 6px 12px;
      border-radius: 3px;
      font-size: 0.85rem;
      outline: none;
      cursor: pointer;
    }

    .btn-primary { background-color: #0284c7; color: white; border: 1px solid #38bdf8; padding: 6px 14px; border-radius: 3px; font-weight: bold; font-size: 0.8rem; cursor: pointer; text-transform: uppercase; }
    .btn-primary:hover { background-color: #0369a1; }

    /* Table CAD */
    .table-container { background-color: var(--cad-panel); border: 1px solid var(--cad-border); border-radius: 4px; overflow-x: auto; margin-bottom: 16px; }
    table.smart-table { width: 100%; border-collapse: collapse; text-align: left; }
    table.smart-table th { background-color: var(--cad-header); color: var(--cad-cyan); font-size: 0.75rem; text-transform: uppercase; padding: 10px 14px; border-bottom: 1px solid var(--cad-border); }
    table.smart-table td { padding: 10px 14px; border-bottom: 1px solid var(--cad-border); font-size: 0.85rem; }
    table.smart-table tr.row-item { cursor: pointer; transition: background 0.15s; }
    table.smart-table tr.row-item:hover { background-color: #2a2d2e; }
    table.smart-table tr.selected { background-color: #37373d !important; border-left: 3px solid var(--cad-yellow); }

    /* Badges */
    .badge { display: inline-block; padding: 2px 8px; border-radius: 2px; font-size: 0.7rem; font-weight: bold; text-transform: uppercase; }
    .badge-diseno { background-color: #451a03; color: #fde047; border: 1px solid #78350f; }
    .badge-liberacion { background-color: #0c4a6e; color: #38bdf8; border: 1px solid #0369a1; }
    .badge-implementacion { background-color: #3b0764; color: #e9d5ff; border: 1px solid #6b21a8; }
    .badge-micro { background-color: #27272a; color: #a1a1aa; border: 1px solid #3f3f46; }
    .badge-prio-alta { background-color: #450a0a; color: #fca5a5; border: 1px solid #991b1b; }
    .badge-prio-media { background-color: #431407; color: #fdba74; border: 1px solid #9a3412; }
    .badge-prio-baja { background-color: #052e16; color: #86efac; border: 1px solid #166534; }
    .code-tag { font-family: monospace; font-weight: bold; color: var(--cad-cyan); background-color: var(--cad-bg); padding: 2px 6px; border-radius: 2px; border: 1px solid var(--cad-border); }

    /* Detail Panel CAD */
    .detail-panel {
      background-color: var(--cad-panel);
      border: 1px solid var(--cad-cyan);
      border-radius: 4px;
      padding: 16px;
      display: none;
      box-shadow: 0 4px 20px rgba(0,0,0,0.5);
      margin-bottom: 24px;
    }
    .detail-panel.active { display: block; }
    .detail-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--cad-border); padding-bottom: 10px; margin-bottom: 14px; flex-wrap: wrap; gap: 10px; }
    .detail-header h3 { font-size: 1rem; color: #fff; }
    
    .checklist-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 12px;
      margin-bottom: 16px;
    }
    .checklist-card {
      background-color: var(--cad-bg);
      border: 1px solid var(--cad-border);
      border-radius: 3px;
      padding: 12px;
    }
    .checklist-card h4 { font-size: 0.75rem; color: var(--cad-cyan); text-transform: uppercase; margin-bottom: 8px; border-bottom: 1px solid var(--cad-border); padding-bottom: 4px; letter-spacing: 0.5px; }
    .check-item { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; font-size: 0.8rem; cursor: pointer; color: var(--cad-text); }
    .check-item input { accent-color: var(--cad-cyan); cursor: pointer; }

    .notes-section textarea {
      width: 100%; padding: 8px; background-color: var(--cad-bg); color: #fff; border: 1px solid var(--cad-border); border-radius: 3px; font-size: 0.8rem;
    }

    /* Modal Styles */
    .modal-overlay {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0, 0, 0, 0.8);
      display: none; justify-content: center; align-items: center; z-index: 1000;
    }
    .modal-overlay.active { display: flex; }
    .modal-card { background: var(--cad-panel); border: 1px solid var(--cad-cyan); border-radius: 4px; width: 100%; max-width: 480px; padding: 20px; color: var(--cad-text); }
    .modal-card h2 { margin-bottom: 14px; font-size: 1.1rem; color: #fff; }
    .form-group { margin-bottom: 12px; }
    .form-group label { display: block; font-size: 0.75rem; color: var(--cad-text-dim); text-transform: uppercase; margin-bottom: 4px; }
    .form-group input, .form-group select, .form-group textarea {
      width: 100%; padding: 8px; background-color: var(--cad-bg); color: #fff; border: 1px solid var(--cad-border); border-radius: 3px; font-size: 0.85rem;
    }
    .modal-actions { display: flex; justify-content: flex-end; gap: 8px; margin-top: 16px; }
    
    /* Buttons CAD */
    .btn-secondary { background: #333333; color: #ccc; border: 1px solid var(--cad-border); padding: 5px 12px; border-radius: 3px; cursor: pointer; font-size: 0.75rem; text-transform: uppercase; }
    .btn-action { background: #0284c7; color: white; border: none; padding: 5px 12px; border-radius: 3px; font-weight: bold; cursor: pointer; font-size: 0.75rem; text-transform: uppercase; }
    .btn-danger { background: var(--cad-red); color: white; border: none; padding: 5px 12px; border-radius: 3px; font-weight: bold; cursor: pointer; font-size: 0.75rem; text-transform: uppercase; }
    .btn-danger:hover { background: #dc2626; }
  </style>
</head>
<body>

  <!-- Header CAD -->
  <header class="header">
    <div class="header-title">
      <h1>[CAD WORKSTATION] - Panel Damián Alvarez</h1>
      <p>Gestión de Tareas, Planos y Secuencia TDD</p>
    </div>
    <div class="user-badge">STATUS: <strong>ONLINE</strong></div>
  </header>

  <!-- Controls Bar con Submenú de Filtros -->
  <div class="controls-bar">
    <div class="filter-submenu">
      <label for="select-filtro-etapa">🔍 Filtrar Vista:</label>
      <select id="select-filtro-etapa" class="cad-select">
        <option value="TODOS">--- MOSTRAR TODAS ---</option>
        <option value="DISENO">1. En Diseño</option>
        <option value="LIBERACION">2. En Liberación</option>
        <option value="IMPLEMENTACION">3. Implementación</option>
        <option value="MICRO_TAREAS">Micro-tareas</option>
      </select>
    </div>

    <button class="btn-primary" id="btn-abrir-modal">+ Nueva Tarea</button>
  </div>

  <!-- Table CAD -->
  <div class="table-container">
    <table class="smart-table">
      <thead>
        <tr>
          <th>Código</th>
          <th>Proyecto / Tarea</th>
          <th>Tipo</th>
          <th>Etapa Actual</th>
          <th>Checklist</th>
          <th>Prioridad</th>
        </tr>
      </thead>
      <tbody id="tabla-proyectos-body">
        <tr><td colspan="6" style="text-align:center; padding:20px; color:var(--cad-text-dim);">Cargando base de datos CAD...</td></tr>
      </tbody>
    </table>
  </div>

  <!-- Panel de Detalle Desplegable CAD -->
  <div class="detail-panel" id="panel-detalle">
    <div class="detail-header">
      <div>
        <span class="code-tag" id="panel-codigo">PRJ-000</span>
        <h3 id="panel-titulo" style="display:inline; margin-left:8px;">Título de la Tarea</h3>
      </div>
      <div style="display: flex; gap: 8px;">
        <button class="btn-action" id="btn-avanzar-etapa">Avanzar Etapa ➔</button>
        <button class="btn-danger" id="btn-eliminar-tarea">Eliminar 🗑️</button>
        <button class="btn-secondary" id="btn-cerrar-panel">✕ Cerrar</button>
      </div>
    </div>

    <!-- Checklists por Etapa -->
    <div class="checklist-grid">
      <!-- Etapa 1 -->
      <div class="checklist-card">
        <h4>1. Diseño</h4>
        <label class="check-item"><input type="checkbox" id="chk-cnGenerado"> CN Generado</label>
        <label class="check-item"><input type="checkbox" id="chk-modelado3D"> Modelado 3D</label>
        <label class="check-item"><input type="checkbox" id="chk-plano2D"> Plano 2D / DRW / LAY</label>
        <label class="check-item"><input type="checkbox" id="chk-montajeTDD"> Montaje TDD</label>
      </div>

      <!-- Etapa 2 -->
      <div class="checklist-card">
        <h4>2. Soporte IT</h4>
        <label class="check-item"><input type="checkbox" id="chk-reservaCodigos"> Reserva de códigos</label>
        <label class="check-item"><input type="checkbox" id="chk-generacionWtparts"> Generación Wtparts</label>
      </div>

      <!-- Etapa 3 -->
      <div class="checklist-card">
        <h4>3. Liberación</h4>
        <label class="check-item"><input type="checkbox" id="chk-cnReleased"> CN Released</label>
        <label class="check-item"><input type="checkbox" id="chk-publicacionPlanos"> Publicación Planos</label>
      </div>
    </div>

    <div class="notes-section">
      <label style="font-size:0.75rem; color:var(--cad-text-dim); text-transform:uppercase; display:block; margin-bottom:4px;">Notas / Registro de Cambios:</label>
      <textarea id="txt-notas" rows="2" placeholder="Ej: CN #8841 - Modificación de caras según solicitud..."></textarea>
    </div>
  </div>

  <!-- Modal Nueva Tarea -->
  <div class="modal-overlay" id="modal-proyecto">
    <div class="modal-card">
      <h2>+ Cargar Nueva Tarea</h2>
      <form id="form-nuevo-proyecto">
        <div class="form-group">
          <label>Título del Proyecto / Tarea</label>
          <input type="text" id="input-titulo" placeholder="Ej: Rediseño Soporte Batería" required>
        </div>
        <div class="form-group">
          <label>Descripción (Opcional)</label>
          <textarea id="input-desc" rows="2" placeholder="Ej: CN #8841 - Ajuste de geometrías..."></textarea>
        </div>
        <div class="form-group">
          <label>Tipo</label>
          <select id="select-tipo">
            <option value="PROYECTO">Proyecto (3 Etapas)</option>
            <option value="MICRO_TAREA">Micro-tarea (Dispositivo / Gage / 3D)</option>
          </select>
        </div>
        <div class="form-group">
          <label>Prioridad</label>
          <select id="select-prioridad">
            <option value="Alta">Alta</option>
            <option value="Media" selected>Media</option>
            <option value="Baja">Baja</option>
          </select>
        </div>
        <div class="modal-actions">
          <button type="button" class="btn-secondary" id="btn-cerrar-modal">Cancelar</button>
          <button type="submit" class="btn-primary">Guardar</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Firebase Integration -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, onValue, set, update, remove } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCCz7lVrcFl0k-ETlAfAuzyDGFMkeH0jdI",
      authDomain: "tareas-330c6.firebaseapp.com",
      databaseURL: "https://tareas-330c6-default-rtdb.firebaseio.com",
      projectId: "tareas-330c6",
      storageBucket: "tareas-330c6.firebasestorage.app",
      messagingSenderId: "1044040345437",
      appId: "1:1044040345437:web:541dde9dfd2ed41ba4eab4",
      measurementId: "G-JEEYZ29TH1"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    let proyectosCache = {};
    let filtroActual = 'TODOS';
    let proyectoSeleccionadoId = null;

    const checklistKeys = [
      'cnGenerado', 'modelado3D', 'plano2D', 'montajeTDD',
      'reservaCodigos', 'generacionWtparts',
      'cnReleased', 'publicacionPlanos'
    ];

    // Escuchar Firebase Realtime
    onValue(ref(db, 'proyectos'), (snapshot) => {
      proyectosCache = snapshot.val() || {};
      renderizarTabla();
      if (proyectoSeleccionadoId && proyectosCache[proyectoSeleccionadoId]) {
        cargarDetalle(proyectoSeleccionadoId);
      } else if (proyectoSeleccionadoId && !proyectosCache[proyectoSeleccionadoId]) {
        // Si fue eliminada, cerrar el panel
        document.getElementById('panel-detalle').classList.remove('active');
        proyectoSeleccionadoId = null;
      }
    });

    // Renderizar Tabla
    function renderizarTabla() {
      const tbody = document.getElementById('tabla-proyectos-body');
      tbody.innerHTML = '';

      const lista = Object.values(proyectosCache);

      const filtrados = lista.filter(item => {
        if (filtroActual === 'DISENO') return item.etapaActual === 'DISENO';
        if (filtroActual === 'LIBERACION') return item.etapaActual === 'LIBERACION';
        if (filtroActual === 'IMPLEMENTACION') return item.etapaActual === 'IMPLEMENTACION';
        if (filtroActual === 'MICRO_TAREAS') return item.tipo === 'MICRO_TAREA';
        return true;
      });

      if (filtrados.length === 0) {
        tbody.innerHTML = `<tr><td colspan="6" style="text-align:center; color:var(--cad-text-dim); padding: 20px;">No hay registros para este filtro.</td></tr>`;
        return;
      }

      filtrados.forEach(item => {
        const tr = document.createElement('tr');
        tr.className = 'row-item' + (item.id === proyectoSeleccionadoId ? ' selected' : '');
        
        const checks = item.checklists || {};
        const marcados = checklistKeys.filter(k => checks[k]).length;
        const total = checklistKeys.length;

        tr.innerHTML = `
          <td><span class="code-tag">${item.id}</span></td>
          <td><strong>${item.titulo}</strong><br><small style="color: var(--cad-text-dim);">${item.descripcion || ''}</small></td>
          <td><span class="badge badge-micro">${item.tipo}</span></td>
          <td>${obtenerEtapaBadge(item.etapaActual)}</td>
          <td><small style="font-weight:bold; color: var(--cad-cyan);">${marcados}/${total}</small></td>
          <td><span class="badge badge-prio-${(item.prioridad || 'media').toLowerCase()}">${item.prioridad || 'Media'}</span></td>
        `;

        tr.onclick = () => {
          proyectoSeleccionadoId = item.id;
          renderizarTabla();
          cargarDetalle(item.id);
        };

        tbody.appendChild(tr);
      });
    }

    function obtenerEtapaBadge(etapa) {
      if (etapa === 'DISENO') return `<span class="badge badge-diseno">1. Diseño</span>`;
      if (etapa === 'LIBERACION') return `<span class="badge badge-liberacion">2. Liberación</span>`;
      if (etapa === 'IMPLEMENTACION') return `<span class="badge badge-implementacion">3. Implementación</span>`;
      return `<span class="badge badge-micro">${etapa || 'En Proceso'}</span>`;
    }

    // Cargar Detalle
    function cargarDetalle(id) {
      const item = proyectosCache[id];
      if (!item) return;

      document.getElementById('panel-codigo').innerText = item.id;
      document.getElementById('panel-titulo').innerText = item.titulo;
      document.getElementById('txt-notas').value = item.notas || '';

      const checks = item.checklists || {};
      checklistKeys.forEach(k => {
        const el = document.getElementById(`chk-${k}`);
        if (el) el.checked = !!checks[k];
      });

      document.getElementById('panel-detalle').classList.add('active');
    }

    // Checkboxes sync
    checklistKeys.forEach(k => {
      const el = document.getElementById(`chk-${k}`);
      if (el) {
        el.onchange = (e) => {
          if (!proyectoSeleccionadoId) return;
          update(ref(db, `proyectos/${proyectoSeleccionadoId}/checklists`), {
            [k]: e.target.checked
          });
        };
      }
    });

    // Guardar Notas
    document.getElementById('txt-notas').onblur = (e) => {
      if (!proyectoSeleccionadoId) return;
      update(ref(db, `proyectos/${proyectoSeleccionadoId}`), {
        notas: e.target.value
      });
    };

    // Avanzar Etapa
    document.getElementById('btn-avanzar-etapa').onclick = () => {
      if (!proyectoSeleccionadoId) return;
      const item = proyectosCache[proyectoSeleccionadoId];
      let nuevaEtapa = 'DISENO';

      if (item.etapaActual === 'DISENO') nuevaEtapa = 'LIBERACION';
      else if (item.etapaActual === 'LIBERACION') nuevaEtapa = 'IMPLEMENTACION';
      else nuevaEtapa = 'IMPLEMENTACION';

      update(ref(db, `proyectos/${proyectoSeleccionadoId}`), {
        etapaActual: nuevaEtapa
      });
    };

    // ELIMINAR TAREA (Nueva función)
    document.getElementById('btn-eliminar-tarea').onclick = () => {
      if (!proyectoSeleccionadoId) return;
      
      const confirmacion = confirm(`¿Estás seguro de eliminar la tarea ${proyectoSeleccionadoId}?`);
      if (confirmacion) {
        remove(ref(db, `proyectos/${proyectoSeleccionadoId}`))
          .then(() => {
            document.getElementById('panel-detalle').classList.remove('active');
            proyectoSeleccionadoId = null;
          });
      }
    };

    // Cerrar Panel
    document.getElementById('btn-cerrar-panel').onclick = () => {
      document.getElementById('panel-detalle').classList.remove('active');
      proyectoSeleccionadoId = null;
      renderizarTabla();
    };

    // Submenú Filtro Select
    document.getElementById('select-filtro-etapa').onchange = (e) => {
      filtroActual = e.target.value;
      renderizarTabla();
    };

    // Modal
    const modal = document.getElementById('modal-proyecto');
    document.getElementById('btn-abrir-modal').onclick = () => modal.classList.add('active');
    document.getElementById('btn-cerrar-modal').onclick = () => modal.classList.remove('active');

    // Guardar Tarea
    document.getElementById('form-nuevo-proyecto').onsubmit = (e) => {
      e.preventDefault();

      const titulo = document.getElementById('input-titulo').value;
      const desc = document.getElementById('input-desc').value;
      const tipo = document.getElementById('select-tipo').value;
      const prioridad = document.getElementById('select-prioridad').value;

      const idGenerado = 'PRJ-' + Math.floor(100 + Math.random() * 900);

      const nuevaTarea = {
        id: idGenerado,
        titulo: titulo,
        descripcion: desc,
        tipo: tipo,
        asignadoA: "usr_damian",
        prioridad: prioridad,
        etapaActual: tipo === 'MICRO_TAREA' ? 'EN_PROCESO' : 'DISENO',
        checklists: {},
        notas: ''
      };

      set(ref(db, `proyectos/${idGenerado}`), nuevaTarea)
        .then(() => {
          modal.classList.remove('active');
          document.getElementById('form-nuevo-proyecto').reset();
        });
    };
  </script>
</body>
</html>
