<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Control de Proyectos | Damián Alvarez</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-dark: #0b0f19;
      --card-bg: rgba(17, 24, 39, 0.75);
      --card-border: #1f293d;
      --card-border-hover: #374151;
      --text-main: #f3f4f6;
      --text-muted: #9ca3af;
      --accent-blue: #3b82f6;
      --accent-blue-hover: #2563eb;
      --danger-red: #ef4444;
      --danger-hover: #dc2626;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', system-ui, -apple-system, sans-serif; }
    
    body { 
      background-color: var(--bg-dark); 
      color: var(--text-main); 
      padding: 24px;
      min-height: 100vh;
      /* Fondo con patrón técnico/grilla tenue */
      background-image: 
        radial-gradient(circle at 50% 0%, rgba(59, 130, 246, 0.08) 0%, transparent 50%),
        linear-gradient(rgba(255, 255, 255, 0.02) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.02) 1px, transparent 1px);
      background-size: 100% 100%, 32px 32px, 32px 32px;
    }

    .container { max-width: 1200px; margin: 0 auto; }

    /* Header */
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
      padding-bottom: 16px;
      border-bottom: 1px solid var(--card-border);
      flex-wrap: wrap;
      gap: 16px;
    }
    .header-title h1 { font-size: 1.35rem; font-weight: 700; color: #ffffff; letter-spacing: -0.02em; }
    .header-title p { font-size: 0.85rem; color: var(--text-muted); margin-top: 4px; }
    
    .user-badge {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      padding: 6px 14px;
      border-radius: 20px;
      font-size: 0.8rem;
      color: var(--text-muted);
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .user-badge .status-dot { width: 8px; height: 8px; background-color: #10b981; border-radius: 50%; box-shadow: 0 0 8px #10b981; }
    .user-badge strong { color: var(--text-main); }

    /* Control Bar */
    .controls-bar {
      background: var(--card-bg);
      backdrop-filter: blur(8px);
      border: 1px solid var(--card-border);
      border-radius: 10px;
      padding: 12px 18px;
      margin-bottom: 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 12px;
    }

    .filter-submenu {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .filter-submenu label { font-size: 0.8rem; font-weight: 500; color: var(--text-muted); }
    .modern-select {
      background-color: #111827;
      color: var(--text-main);
      border: 1px solid var(--card-border);
      padding: 6px 12px;
      border-radius: 6px;
      font-size: 0.85rem;
      outline: none;
      cursor: pointer;
      transition: all 0.2s;
    }
    .modern-select:hover { border-color: var(--card-border-hover); }

    /* Buttons */
    .btn-primary { 
      background-color: var(--accent-blue); 
      color: white; 
      border: none; 
      padding: 8px 16px; 
      border-radius: 6px; 
      font-weight: 600; 
      font-size: 0.85rem; 
      cursor: pointer; 
      transition: background 0.2s; 
    }
    .btn-primary:hover { background-color: var(--accent-blue-hover); }

    .btn-secondary { 
      background-color: #1f2937; 
      color: var(--text-main); 
      border: 1px solid var(--card-border); 
      padding: 6px 14px; 
      border-radius: 6px; 
      cursor: pointer; 
      font-size: 0.8rem; 
      font-weight: 500; 
      transition: background 0.2s; 
    }
    .btn-secondary:hover { background-color: #374151; }

    .btn-danger { 
      background-color: rgba(239, 68, 68, 0.15); 
      color: #fca5a5; 
      border: 1px solid rgba(239, 68, 68, 0.3); 
      padding: 6px 14px; 
      border-radius: 6px; 
      font-weight: 500; 
      cursor: pointer; 
      font-size: 0.8rem; 
      transition: all 0.2s; 
    }
    .btn-danger:hover { background-color: var(--danger-red); color: white; }

    /* Table */
    .table-container { 
      background: var(--card-bg); 
      backdrop-filter: blur(8px); 
      border: 1px solid var(--card-border); 
      border-radius: 10px; 
      overflow-x: auto; 
      margin-bottom: 24px; 
    }
    table.smart-table { width: 100%; border-collapse: collapse; text-align: left; }
    table.smart-table th { 
      background-color: rgba(17, 24, 39, 0.9); 
      color: var(--text-muted); 
      font-size: 0.75rem; 
      font-weight: 600; 
      text-transform: uppercase; 
      letter-spacing: 0.05em; 
      padding: 12px 18px; 
      border-bottom: 1px solid var(--card-border); 
    }
    table.smart-table td { padding: 14px 18px; border-bottom: 1px solid var(--card-border); font-size: 0.88rem; }
    table.smart-table tr.row-item { cursor: pointer; transition: background 0.15s; }
    table.smart-table tr.row-item:hover { background-color: rgba(31, 41, 55, 0.5); }
    table.smart-table tr.selected { background-color: rgba(59, 130, 246, 0.1) !important; border-left: 3px solid var(--accent-blue); }

    /* Badges Elegantes */
    .badge { display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: 0.72rem; font-weight: 600; letter-spacing: 0.02em; }
    .badge-diseno { background-color: rgba(245, 158, 11, 0.15); color: #fbbf24; border: 1px solid rgba(245, 158, 11, 0.25); }
    .badge-liberacion { background-color: rgba(59, 130, 246, 0.15); color: #60a5fa; border: 1px solid rgba(59, 130, 246, 0.25); }
    .badge-implementacion { background-color: rgba(168, 85, 247, 0.15); color: #c084fc; border: 1px solid rgba(168, 85, 247, 0.25); }
    .badge-micro { background-color: rgba(107, 114, 128, 0.15); color: #9ca3af; border: 1px solid rgba(107, 114, 128, 0.25); }
    
    .badge-prio-alta { background-color: rgba(239, 68, 68, 0.15); color: #fca5a5; border: 1px solid rgba(239, 68, 68, 0.25); }
    .badge-prio-media { background-color: rgba(245, 158, 11, 0.15); color: #fde047; border: 1px solid rgba(245, 158, 11, 0.25); }
    .badge-prio-baja { background-color: rgba(16, 185, 129, 0.15); color: #6ee7b7; border: 1px solid rgba(16, 185, 129, 0.25); }
    
    .code-tag { font-family: monospace; font-weight: 600; color: #93c5fd; background-color: rgba(30, 58, 138, 0.3); padding: 2px 8px; border-radius: 4px; border: 1px solid rgba(59, 130, 246, 0.2); }

    /* Detail Panel */
    .detail-panel {
      background: var(--card-bg);
      backdrop-filter: blur(12px);
      border: 1px solid var(--accent-blue);
      border-radius: 10px;
      padding: 20px;
      display: none;
      box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.5);
      margin-bottom: 24px;
    }
    .detail-panel.active { display: block; animation: fadeIn 0.2s ease-in-out; }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(4px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .detail-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--card-border); padding-bottom: 14px; margin-bottom: 18px; flex-wrap: wrap; gap: 12px; }
    .detail-header h3 { font-size: 1.1rem; color: #ffffff; font-weight: 600; }
    
    .checklist-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 16px;
      margin-bottom: 20px;
    }
    .checklist-card {
      background-color: rgba(11, 15, 25, 0.6);
      border: 1px solid var(--card-border);
      border-radius: 8px;
      padding: 14px;
    }
    .checklist-card h4 { font-size: 0.78rem; font-weight: 600; color: #60a5fa; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 12px; border-bottom: 1px solid var(--card-border); padding-bottom: 6px; }
    
    .check-item { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; font-size: 0.85rem; cursor: pointer; color: var(--text-main); }
    .check-item input { accent-color: var(--accent-blue); width: 16px; height: 16px; cursor: pointer; }

    .notes-section label { font-size: 0.8rem; font-weight: 500; color: var(--text-muted); display: block; margin-bottom: 6px; }
    .notes-section textarea {
      width: 100%; padding: 10px; background-color: rgba(11, 15, 25, 0.6); color: #fff; border: 1px solid var(--card-border); border-radius: 6px; font-size: 0.85rem; outline: none; transition: border-color 0.2s;
    }
    .notes-section textarea:focus { border-color: var(--accent-blue); }

    /* Modal */
    .modal-overlay {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0, 0, 0, 0.75);
      backdrop-filter: blur(4px);
      display: none; justify-content: center; align-items: center; z-index: 1000;
    }
    .modal-overlay.active { display: flex; }
    .modal-card { background: #111827; border: 1px solid var(--card-border); border-radius: 10px; width: 100%; max-width: 480px; padding: 24px; box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.5); }
    .modal-card h2 { margin-bottom: 16px; font-size: 1.15rem; color: #ffffff; font-weight: 600; }
    .form-group { margin-bottom: 14px; }
    .form-group label { display: block; font-size: 0.78rem; font-weight: 500; color: var(--text-muted); margin-bottom: 6px; }
    .form-group input, .form-group select, .form-group textarea {
      width: 100%; padding: 8px 12px; background-color: var(--bg-dark); color: #fff; border: 1px solid var(--card-border); border-radius: 6px; font-size: 0.88rem; outline: none;
    }
    .form-group input:focus, .form-group select:focus, .form-group textarea:focus { border-color: var(--accent-blue); }
    .modal-actions { display: flex; justify-content: flex-end; gap: 10px; margin-top: 20px; }
  </style>
</head>
<body>

  <div class="container">
    <!-- Header -->
    <header class="header">
      <div class="header-title">
        <h1>Panel de Control de Ingeniería</h1>
        <p>Seguimiento de proyectos, liberaciones y registros TDD</p>
      </div>
      <div class="user-badge">
        <span class="status-dot"></span>
        Usuario: <strong>Damián Alvarez</strong>
      </div>
    </header>

    <!-- Controls Bar con Submenú de Filtros -->
    <div class="controls-bar">
      <div class="filter-submenu">
        <label for="select-filtro-etapa">Filtrar por Vista:</label>
        <select id="select-filtro-etapa" class="modern-select">
          <option value="TODOS">Todas las tareas</option>
          <option value="DISENO">1. En Diseño</option>
          <option value="LIBERACION">2. En Liberación</option>
          <option value="IMPLEMENTACION">3. Implementación</option>
          <option value="MICRO_TAREAS">Micro-tareas</option>
        </select>
      </div>

      <button class="btn-primary" id="btn-abrir-modal">+ Nueva Tarea</button>
    </div>

    <!-- Table -->
    <div class="table-container">
      <table class="smart-table">
        <thead>
          <tr>
            <th>Código</th>
            <th>Proyecto / Tarea</th>
            <th>Tipo</th>
            <th>Etapa Actual</th>
            <th>Progreso</th>
            <th>Prioridad</th>
          </tr>
        </thead>
        <tbody id="tabla-proyectos-body">
          <tr><td colspan="6" style="text-align:center; padding:24px; color:var(--text-muted);">Sincronizando con base de datos...</td></tr>
        </tbody>
      </table>
    </div>

    <!-- Panel de Detalle Desplegable -->
    <div class="detail-panel" id="panel-detalle">
      <div class="detail-header">
        <div>
          <span class="code-tag" id="panel-codigo">PRJ-000</span>
          <h3 id="panel-titulo" style="display:inline; margin-left:10px;">Título de la Tarea</h3>
        </div>
        <div style="display: flex; gap: 8px;">
          <button class="btn-primary" id="btn-avanzar-etapa">Avanzar Etapa ➔</button>
          <button class="btn-danger" id="btn-eliminar-tarea">Eliminar 🗑️</button>
          <button class="btn-secondary" id="btn-cerrar-panel">✕ Cerrar</button>
        </div>
      </div>

      <!-- Checklists por Etapa -->
      <div class="checklist-grid">
        <!-- Etapa 1 -->
        <div class="checklist-card">
          <h4>1. Diseño</h4>
          <label class="check-item"><input type="checkbox" id="chk-cnGenerado"> CN Generado</label>
          <label class="check-item"><input type="checkbox" id="chk-modelado3D"> Modelado 3D</label>
          <label class="check-item"><input type="checkbox" id="chk-plano2D"> Plano 2D / DRW / LAY</label>
          <label class="check-item"><input type="checkbox" id="chk-montajeTDD"> Montaje TDD</label>
        </div>

        <!-- Etapa 2 -->
        <div class="checklist-card">
          <h4>2. Soporte IT</h4>
          <label class="check-item"><input type="checkbox" id="chk-reservaCodigos"> Reserva de códigos</label>
          <label class="check-item"><input type="checkbox" id="chk-generacionWtparts"> Generación Wtparts</label>
        </div>

        <!-- Etapa 3 -->
        <div class="checklist-card">
          <h4>3. Liberación</h4>
          <label class="check-item"><input type="checkbox" id="chk-cnReleased"> CN Released</label>
          <label class="check-item"><input type="checkbox" id="chk-publicacionPlanos"> Publicación Planos</label>
        </div>
      </div>

      <div class="notes-section">
        <label>Notas y Registro de Avances:</label>
        <textarea id="txt-notas" rows="2" placeholder="Añadir observaciones o números de referencia..."></textarea>
      </div>
    </div>
  </div>

  <!-- Modal Nueva Tarea -->
  <div class="modal-overlay" id="modal-proyecto">
    <div class="modal-card">
      <h2>+ Cargar Nueva Tarea</h2>
      <form id="form-nuevo-proyecto">
        <div class="form-group">
          <label>Título del Proyecto / Tarea</label>
          <input type="text" id="input-titulo" placeholder="Ej: Rediseño Soporte Batería" required>
        </div>
        <div class="form-group">
          <label>Descripción / Detalle</label>
          <textarea id="input-desc" rows="2" placeholder="Ej: CN #8841 - Ajuste de geometrías..."></textarea>
        </div>
        <div class="form-group">
          <label>Tipo</label>
          <select id="select-tipo">
            <option value="PROYECTO">Proyecto (3 Etapas)</option>
            <option value="MICRO_TAREA">Micro-tarea (Dispositivo / Gage / Impresión 3D)</option>
          </select>
        </div>
        <div class="form-group">
          <label>Prioridad</label>
          <select id="select-prioridad">
            <option value="Alta">Alta</option>
            <option value="Media" selected>Media</option>
            <option value="Baja">Baja</option>
          </select>
        </div>
        <div class="modal-actions">
          <button type="button" class="btn-secondary" id="btn-cerrar-modal">Cancelar</button>
          <button type="submit" class="btn-primary">Guardar Tarea</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Firebase Integration -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, onValue, set, update, remove } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCCz7lVrcFl0k-ETlAfAuzyDGFMkeH0jdI",
      authDomain: "tareas-330c6.firebaseapp.com",
      databaseURL: "https://tareas-330c6-default-rtdb.firebaseio.com",
      projectId: "tareas-330c6",
      storageBucket: "tareas-330c6.firebasestorage.app",
      messagingSenderId: "1044040345437",
      appId: "1:1044040345437:web:541dde9dfd2ed41ba4eab4",
      measurementId: "G-JEEYZ29TH1"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    let proyectosCache = {};
    let filtroActual = 'TODOS';
    let proyectoSeleccionadoId = null;

    const checklistKeys = [
      'cnGenerado', 'modelado3D', 'plano2D', 'montajeTDD',
      'reservaCodigos', 'generacionWtparts',
      'cnReleased', 'publicacionPlanos'
    ];

    // Escuchar Firebase Realtime
    onValue(ref(db, 'proyectos'), (snapshot) => {
      proyectosCache = snapshot.val() || {};
      renderizarTabla();
      if (proyectoSeleccionadoId && proyectosCache[proyectoSeleccionadoId]) {
        cargarDetalle(proyectoSeleccionadoId);
      } else if (proyectoSeleccionadoId && !proyectosCache[proyectoSeleccionadoId]) {
        document.getElementById('panel-detalle').classList.remove('active');
        proyectoSeleccionadoId = null;
      }
    });

    // Renderizar Tabla
    function renderizarTabla() {
      const tbody = document.getElementById('tabla-proyectos-body');
      tbody.innerHTML = '';

      const lista = Object.values(proyectosCache);

      const filtrados = lista.filter(item => {
        if (filtroActual === 'DISENO') return item.etapaActual === 'DISENO';
        if (filtroActual === 'LIBERACION') return item.etapaActual === 'LIBERACION';
        if (filtroActual === 'IMPLEMENTACION') return item.etapaActual === 'IMPLEMENTACION';
        if (filtroActual === 'MICRO_TAREAS') return item.tipo === 'MICRO_TAREA';
        return true;
      });

      if (filtrados.length === 0) {
        tbody.innerHTML = `<tr><td colspan="6" style="text-align:center; color:var(--text-muted); padding: 24px;">No hay tareas registradas en esta vista.</td></tr>`;
        return;
      }

      filtrados.forEach(item => {
        const tr = document.createElement('tr');
        tr.className = 'row-item' + (item.id === proyectoSeleccionadoId ? ' selected' : '');
        
        const checks = item.checklists || {};
        const marcados = checklistKeys.filter(k => checks[k]).length;
        const total = checklistKeys.length;
        const pct = Math.round((marcados / total) * 100);

        tr.innerHTML = `
          <td><span class="code-tag">${item.id}</span></td>
          <td><strong>${item.titulo}</strong><br><small style="color: var(--text-muted); font-size:0.78rem;">${item.descripcion || ''}</small></td>
          <td><span class="badge badge-micro">${item.tipo}</span></td>
          <td>${obtenerEtapaBadge(item.etapaActual)}</td>
          <td><small style="font-weight:600; color: #93c5fd;">${marcados}/${total} (${pct}%)</small></td>
          <td><span class="badge badge-prio-${(item.prioridad || 'media').toLowerCase()}">${item.prioridad || 'Media'}</span></td>
        `;

        tr.onclick = () => {
          proyectoSeleccionadoId = item.id;
          renderizarTabla();
          cargarDetalle(item.id);
        };

        tbody.appendChild(tr);
      });
    }

    function obtenerEtapaBadge(etapa) {
      if (etapa === 'DISENO') return `<span class="badge badge-diseno">1. En Diseño</span>`;
      if (etapa === 'LIBERACION') return `<span class="badge badge-liberacion">2. En Liberación</span>`;
      if (etapa === 'IMPLEMENTACION') return `<span class="badge badge-implementacion">3. Implementación</span>`;
      return `<span class="badge badge-micro">${etapa || 'En Proceso'}</span>`;
    }

    // Cargar Detalle
    function cargarDetalle(id) {
      const item = proyectosCache[id];
      if (!item) return;

      document.getElementById('panel-codigo').innerText = item.id;
      document.getElementById('panel-titulo').innerText = item.titulo;
      document.getElementById('txt-notas').value = item.notas || '';

      const checks = item.checklists || {};
      checklistKeys.forEach(k => {
        const el = document.getElementById(`chk-${k}`);
        if (el) el.checked = !!checks[k];
      });

      document.getElementById('panel-detalle').classList.add('active');
    }

    // Checkboxes sync
    checklistKeys.forEach(k => {
      const el = document.getElementById(`chk-${k}`);
      if (el) {
        el.onchange = (e) => {
          if (!proyectoSeleccionadoId) return;
          update(ref(db, `proyectos/${proyectoSeleccionadoId}/checklists`), {
            [k]: e.target.checked
          });
        };
      }
    });

    // Guardar Notas
    document.getElementById('txt-notas').onblur = (e) => {
      if (!proyectoSeleccionadoId) return;
      update(ref(db, `proyectos/${proyectoSeleccionadoId}`), {
        notas: e.target.value
      });
    };

    // Avanzar Etapa
    document.getElementById('btn-avanzar-etapa').onclick = () => {
      if (!proyectoSeleccionadoId) return;
      const item = proyectosCache[proyectoSeleccionadoId];
      let nuevaEtapa = 'DISENO';

      if (item.etapaActual === 'DISENO') nuevaEtapa = 'LIBERACION';
      else if (item.etapaActual === 'LIBERACION') nuevaEtapa = 'IMPLEMENTACION';
      else nuevaEtapa = 'IMPLEMENTACION';

      update(ref(db, `proyectos/${proyectoSeleccionadoId}`), {
        etapaActual: nuevaEtapa
      });
    };

    // Eliminar Tarea
    document.getElementById('btn-eliminar-tarea').onclick = () => {
      if (!proyectoSeleccionadoId) return;
      
      const confirmacion = confirm(`¿Estás seguro de eliminar la tarea ${proyectoSeleccionadoId}?`);
      if (confirmacion) {
        remove(ref(db, `proyectos/${proyectoSeleccionadoId}`))
          .then(() => {
            document.getElementById('panel-detalle').classList.remove('active');
            proyectoSeleccionadoId = null;
          });
      }
    };

    // Cerrar Panel
    document.getElementById('btn-cerrar-panel').onclick = () => {
      document.getElementById('panel-detalle').classList.remove('active');
      proyectoSeleccionadoId = null;
      renderizarTabla();
    };

    // Submenú Filtro Select
    document.getElementById('select-filtro-etapa').onchange = (e) => {
      filtroActual = e.target.value;
      renderizarTabla();
    };

    // Modal
    const modal = document.getElementById('modal-proyecto');
    document.getElementById('btn-abrir-modal').onclick = () => modal.classList.add('active');
    document.getElementById('btn-cerrar-modal').onclick = () => modal.classList.remove('active');

    // Guardar Tarea
    document.getElementById('form-nuevo-proyecto').onsubmit = (e) => {
      e.preventDefault();

      const titulo = document.getElementById('input-titulo').value;
      const desc = document.getElementById('input-desc').value;
      const tipo = document.getElementById('select-tipo').value;
      const prioridad = document.getElementById('select-prioridad').value;

      const idGenerado = 'PRJ-' + Math.floor(100 + Math.random() * 900);

      const nuevaTarea = {
        id: idGenerado,
        titulo: titulo,
        descripcion: desc,
        tipo: tipo,
        asignadoA: "usr_damian",
        prioridad: prioridad,
        etapaActual: tipo === 'MICRO_TAREA' ? 'EN_PROCESO' : 'DISENO',
        checklists: {},
        notas: ''
      };

      set(ref(db, `proyectos/${idGenerado}`), nuevaTarea)
        .then(() => {
          modal.classList.remove('active');
          document.getElementById('form-nuevo-proyecto').reset();
        });
    };
  </script>
</body>
</html>
