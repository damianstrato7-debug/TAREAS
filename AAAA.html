<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CAD & IT Task Flow</title>
  <style>
    :root {
      --bg-main: #f8fafc;
      --header-bg: #0f172a;
      --accent-blue: #0284c7;
      --border-color: #cbd5e1;
      --text-dark: #1e293b;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
    body { background-color: var(--bg-main); color: var(--text-dark); padding: 20px; }

    /* Header */
    .header {
      background-color: var(--header-bg);
      color: white;
      padding: 16px 24px;
      border-radius: 8px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
      border-bottom: 4px solid var(--accent-blue);
      flex-wrap: wrap;
      gap: 15px;
    }
    .header-title h1 { font-size: 1.4rem; font-weight: 700; }
    .header-title p { font-size: 0.85rem; color: #94a3b8; margin-top: 2px; }
    
    /* Selector de Usuario */
    .user-selector-container {
      display: flex;
      align-items: center;
      gap: 10px;
      background-color: #1e293b;
      border: 1px solid #334155;
      padding: 6px 14px;
      border-radius: 20px;
    }
    .user-selector-container label { font-size: 0.85rem; color: #94a3b8; font-weight: 600; }
    .user-select {
      background-color: #0f172a;
      color: #38bdf8;
      border: 1px solid #0284c7;
      border-radius: 12px;
      padding: 4px 10px;
      font-size: 0.85rem;
      font-weight: 700;
      cursor: pointer;
      outline: none;
    }

    /* Controls */
    .controls-bar {
      background-color: white;
      border: 1px solid var(--border-color);
      border-radius: 8px;
      padding: 12px 16px;
      margin-bottom: 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 10px;
    }
    .filters-group { display: flex; gap: 8px; flex-wrap: wrap; }
    .btn-filter {
      padding: 6px 14px;
      border-radius: 6px;
      font-size: 0.85rem;
      font-weight: 600;
      border: 1px solid var(--border-color);
      background-color: #f1f5f9;
      color: #475569;
      cursor: pointer;
      transition: all 0.2s ease;
    }
    .btn-filter.active { background-color: var(--accent-blue); color: white; border-color: var(--accent-blue); }
    .btn-primary { background-color: #16a34a; color: white; border: none; padding: 8px 16px; border-radius: 6px; font-weight: 700; font-size: 0.85rem; cursor: pointer; }

    /* Table */
    .table-container { background-color: white; border: 1px solid var(--border-color); border-radius: 8px; overflow-x: auto; }
    table.smart-table { width: 100%; border-collapse: collapse; text-align: left; }
    table.smart-table th { background-color: #f1f5f9; color: #334155; font-size: 0.8rem; text-transform: uppercase; padding: 12px 16px; border-bottom: 2px solid var(--border-color); }
    table.smart-table td { padding: 12px 16px; border-bottom: 1px solid #f1f5f9; font-size: 0.9rem; }
    table.smart-table tr:hover { background-color: #f8fafc; }

    /* Badges */
    .badge { display: inline-block; padding: 3px 10px; border-radius: 12px; font-size: 0.75rem; font-weight: 700; text-transform: uppercase; }
    .badge-diseno { background-color: #fef3c7; color: #b45309; }
    .badge-liberacion { background-color: #e0f2fe; color: #0369a1; }
    .badge-implementacion { background-color: #f3e8ff; color: #6b21a8; }
    .badge-micro { background-color: #f1f5f9; color: #475569; }
    .badge-prio-alta { background-color: #fee2e2; color: #b91c1c; }
    .badge-prio-media { background-color: #ffedd5; color: #c2410c; }
    .badge-prio-baja { background-color: #f0fdf4; color: #15803d; }
    .badge-it-ok { background-color: #dcfce7; color: #15803d; }
    .badge-it-pend { background-color: #fef2f2; color: #dc2626; }
    .badge-it-na { background-color: #f1f5f9; color: #94a3b8; }
    .code-tag { font-family: monospace; font-weight: bold; background-color: #f1f5f9; padding: 2px 6px; border-radius: 4px; border: 1px solid var(--border-color); }

    /* Modal Styles */
    .modal-overlay {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(15, 23, 42, 0.6);
      display: none; justify-content: center; align-items: center; z-index: 1000;
    }
    .modal-overlay.active { display: flex; }
    .modal-card {
      background: white; border-radius: 8px; width: 100%; max-width: 500px; padding: 24px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    }
    .modal-card h2 { margin-bottom: 16px; font-size: 1.2rem; color: var(--header-bg); }
    .form-group { margin-bottom: 14px; }
    .form-group label { display: block; font-size: 0.85rem; font-weight: 600; margin-bottom: 4px; }
    .form-group input, .form-group select, .form-group textarea {
      width: 100%; padding: 8px; border: 1px solid var(--border-color); border-radius: 6px; font-size: 0.9rem;
    }
    .checkbox-group { display: flex; align-items: center; gap: 8px; margin-top: 10px; }
    .checkbox-group input { width: auto; }
    .modal-actions { display: flex; justify-content: flex-end; gap: 10px; margin-top: 20px; }
    .btn-secondary { background: #e2e8f0; color: #475569; border: none; padding: 8px 16px; border-radius: 6px; cursor: pointer; font-weight: 600; }
  </style>
</head>
<body>

  <!-- Header con Selector de Usuario -->
  <header class="header">
    <div class="header-title">
      <h1>🛠️ CAD & IT Task Flow</h1>
      <p>Sistema de Gestión de Proyectos, Desarrollo y TDD — Oficina Técnica</p>
    </div>
    
    <div class="user-selector-container">
      <label for="select-sesion">👤 Usuario activo:</label>
      <select id="select-sesion" class="user-select">
        <option value="usr_guillermo">Guillermo Bunting (JEFE)</option>
        <option value="usr_damian">Damián Alvarez (D.CAD)</option>
        <option value="usr_federico">Federico Menoyo (D.CAD)</option>
        <option value="usr_german">Germán Bendazzi (IT)</option>
      </select>
    </div>
  </header>

  <!-- Control Bar -->
  <div class="controls-bar">
    <div class="filters-group">
      <button class="btn-filter active" id="flt-todos">Todos</button>
      <button class="btn-filter" id="flt-mis">Mis Tareas</button>
      <button class="btn-filter" id="flt-aprob">Pendientes Aprobación</button>
      <button class="btn-filter" id="flt-it">Windchill / MIX (Germán)</button>
      <button class="btn-filter" id="flt-micro">Micro-tareas</button>
    </div>
    <button class="btn-primary" id="btn-abrir-modal">+ Nuevo Proyecto</button>
  </div>

  <!-- Table -->
  <div class="table-container">
    <table class="smart-table">
      <thead>
        <tr>
          <th>Código</th>
          <th>Proyecto / Tarea</th>
          <th>Tipo</th>
          <th>Asignado</th>
          <th>Etapa Actual</th>
          <th>IT (Windchill / MIX)</th>
          <th>Prioridad</th>
        </tr>
      </thead>
      <tbody id="tabla-proyectos-body">
        <tr><td colspan="7" style="text-align:center; padding:20px; color:#94a3b8;">Cargando tareas desde Firebase...</td></tr>
      </tbody>
    </table>
  </div>

  <!-- Modal Crear Proyecto -->
  <div class="modal-overlay" id="modal-proyecto">
    <div class="modal-card">
      <h2>+ Nuevo Proyecto / Micro-tarea</h2>
      <form id="form-nuevo-proyecto">
        <div class="form-group">
          <label>Título del Proyecto / Tarea</label>
          <input type="text" id="input-titulo" placeholder="Ej: Rediseño Soporte Batería" required>
        </div>
        <div class="form-group">
          <label>Descripción / Observaciones (Opcional)</label>
          <textarea id="input-desc" rows="2" placeholder="Ej: CN #8841 - Puesta en marcha..."></textarea>
        </div>
        <div class="form-group">
          <label>Tipo</label>
          <select id="select-tipo">
            <option value="PROYECTO">Proyecto (3 Etapas)</option>
            <option value="MICRO_TAREA">Micro-tarea (Soporte/Impresión 3D)</option>
          </select>
        </div>
        <div class="form-group">
          <label>Asignado A</label>
          <select id="select-asignado">
            <option value="usr_damian">Damián Alvarez (D.CAD)</option>
            <option value="usr_federico">Federico Menoyo (D.CAD)</option>
            <option value="usr_german">Germán Bendazzi (IT)</option>
            <option value="usr_guillermo">Guillermo Bunting (JEFE)</option>
          </select>
        </div>
        <div class="form-group">
          <label>Prioridad</label>
          <select id="select-prioridad">
            <option value="Alta">Alta</option>
            <option value="Media" selected>Media</option>
            <option value="Baja">Baja</option>
          </select>
        </div>
        <div class="form-group checkbox-group">
          <input type="checkbox" id="chk-it">
          <label for="chk-it">¿Requiere nuevos artículos en Windchill / MIX?</label>
        </div>
        <div class="modal-actions">
          <button type="button" class="btn-secondary" id="btn-cerrar-modal">Cancelar</button>
          <button type="submit" class="btn-primary">Guardar Tarea</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Firebase Integration -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, onValue, set } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCCz7lVrcFl0k-ETlAfAuzyDGFMkeH0jdI",
      authDomain: "tareas-330c6.firebaseapp.com",
      databaseURL: "https://tareas-330c6-default-rtdb.firebaseio.com",
      projectId: "tareas-330c6",
      storageBucket: "tareas-330c6.firebasestorage.app",
      messagingSenderId: "1044040345437",
      appId: "1:1044040345437:web:541dde9dfd2ed41ba4eab4",
      measurementId: "G-JEEYZ29TH1"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    let proyectosCache = {};
    let filtroActual = 'TODOS';
    let usuarioSesion = localStorage.getItem('usuarioSesion') || "usr_guillermo";

    // Nombres del Equipo
    const usuariosMap = {
      'usr_guillermo': 'Guillermo B.',
      'usr_damian': 'Damián A.',
      'usr_federico': 'Federico M.',
      'usr_german': 'Germán B.'
    };

    // Configurar Selector de Usuario
    const selectorSesion = document.getElementById('select-sesion');
    selectorSesion.value = usuarioSesion;

    selectorSesion.onchange = (e) => {
      usuarioSesion = e.target.value;
      localStorage.setItem('usuarioSesion', usuarioSesion);
      renderizarTabla();
    };

    // Escuchar Firebase Realtime
    onValue(ref(db, 'proyectos'), (snapshot) => {
      proyectosCache = snapshot.val() || {};
      renderizarTabla();
    });

    // Renderizar Tabla
    function renderizarTabla() {
      const tbody = document.getElementById('tabla-proyectos-body');
      tbody.innerHTML = '';

      const lista = Object.values(proyectosCache);

      const filtrados = lista.filter(item => {
        if (filtroActual === 'MIS_TAREAS') return item.asignadoA === usuarioSesion;
        if (filtroActual === 'PENDIENTE_APROBACION') return item.estadoRevision === 'PENDIENTE_APROBACION';
        if (filtroActual === 'SOPORTE_IT') return item.gestionIT && item.gestionIT.requiereNuevosArticulos && item.gestionIT.estadoMIX !== 'COMPLETADO';
        if (filtroActual === 'MICRO_TAREAS') return item.tipo === 'MICRO_TAREA';
        return true;
      });

      if (filtrados.length === 0) {
        tbody.innerHTML = `<tr><td colspan="7" style="text-align:center; color:#94a3b8; padding: 20px;">No hay datos para esta vista.</td></tr>`;
        return;
      }

      filtrados.forEach(item => {
        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td><span class="code-tag">${item.id}</span></td>
          <td><strong>${item.titulo}</strong><br><small style="color: #64748b;">${item.descripcion || ''}</small></td>
          <td><span class="badge badge-micro">${item.tipo}</span></td>
          <td>${usuariosMap[item.asignadoA] || item.asignadoA}</td>
          <td>${obtenerEtapaBadge(item.etapaActual)}</td>
          <td>${obtenerITBadge(item.gestionIT)}</td>
          <td><span class="badge badge-prio-${(item.prioridad || 'media').toLowerCase()}">${item.prioridad || 'Media'}</span></td>
        `;
        tbody.appendChild(tr);
      });
    }

    function obtenerEtapaBadge(etapa) {
      if (etapa === 'DISENO') return `<span class="badge badge-diseno">1. En Diseño</span>`;
      if (etapa === 'LIBERACION') return `<span class="badge badge-liberacion">2. En Liberación</span>`;
      if (etapa === 'IMPLEMENTACION') return `<span class="badge badge-implementacion">3. Implementación</span>`;
      return `<span class="badge badge-micro">${etapa || 'En Proceso'}</span>`;
    }

    function obtenerITBadge(gestionIT) {
      if (!gestionIT || !gestionIT.requiereNuevosArticulos) return `<span class="badge badge-it-na">N/A</span>`;
      if (gestionIT.estadoMIX === 'COMPLETADO') return `<span class="badge badge-it-ok">✅ Completado</span>`;
      return `<span class="badge badge-it-pend">⚠️ Pend. MIX / Windchill</span>`;
    }

    // Manejo de Modal
    const modal = document.getElementById('modal-proyecto');
    document.getElementById('btn-abrir-modal').onclick = () => modal.classList.add('active');
    document.getElementById('btn-cerrar-modal').onclick = () => modal.classList.remove('active');

    // Guardar Tarea en Firebase
    document.getElementById('form-nuevo-proyecto').onsubmit = (e) => {
      e.preventDefault();

      const titulo = document.getElementById('input-titulo').value;
      const desc = document.getElementById('input-desc').value;
      const tipo = document.getElementById('select-tipo').value;
      const asignado = document.getElementById('select-asignado').value;
      const prioridad = document.getElementById('select-prioridad').value;
      const requiereIT = document.getElementById('chk-it').checked;

      const idGenerado = 'PRJ-' + Math.floor(100 + Math.random() * 900);

      const nuevaTarea = {
        id: idGenerado,
        titulo: titulo,
        descripcion: desc,
        tipo: tipo,
        asignadoA: asignado,
        prioridad: prioridad,
        creadoPor: usuarioSesion,
        etapaActual: tipo === 'MICRO_TAREA' ? 'EN_PROCESO' : 'DISENO',
        estadoRevision: 'EN_PROGRESO',
        gestionIT: {
          requiereNuevosArticulos: requiereIT,
          estadoWindchill: requiereIT ? 'PENDIENTE' : 'NO_APLICA',
          estadoMIX: requiereIT ? 'PENDIENTE' : 'NO_APLICA'
        }
      };

      set(ref(db, `proyectos/${idGenerado}`), nuevaTarea)
        .then(() => {
          modal.classList.remove('active');
          document.getElementById('form-nuevo-proyecto').reset();
        });
    };

    // Manejo de Filtros
    const botonesFiltro = [
      { id: 'flt-todos', tipo: 'TODOS' },
      { id: 'flt-mis', tipo: 'MIS_TAREAS' },
      { id: 'flt-aprob', tipo: 'PENDIENTE_APROBACION' },
      { id: 'flt-it', tipo: 'SOPORTE_IT' },
      { id: 'flt-micro', tipo: 'MICRO_TAREAS' }
    ];

    botonesFiltro.forEach(b => {
      document.getElementById(b.id).onclick = (e) => {
        document.querySelectorAll('.btn-filter').forEach(x => x.classList.remove('active'));
        e.target.classList.add('active');
        filtroActual = b.tipo;
        renderizarTabla();
      };
    });
  </script>
</body>
</html>
